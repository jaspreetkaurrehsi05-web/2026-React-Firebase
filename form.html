<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <form action="thank.html">
      <fieldset>
        <legend><h1>Registration Form</h1></legend>
        <table cellpadding="10">
           <tr>
            <td><label>Student  Name</label></td>
            <td><input type="text" placeholder="First name"></td>
            <td><input type="text" placeholder="Middle Name"></td>
            <td><input type="text" placeholder="Last Name"></td>
            </tr>

            <tr>
            <td><label>Father's Name</label></td>
            <td><input type="text" placeholder="Enter your Father's name"></td>
            <td><label>Mother's Name</label></td>
            <td><input type="text" placeholder="Enter your Mother's name"></td>
             </tr>

             <tr>
             <td><label>Date of Birth</label></td>
             <td><input type="date"></td>
             <td><label>Gender</label></td>
             <td><label for="male">Male</label>
             <input type="radio" name="Gender" id="male">
             <label for="female">Female</label>
             <input type="radio" name="Gender" id="female"></td>
             </tr>

             <tr>
             <td><label for="">Category:</label></td>
             <td><label for="general">General</label>
             <input type="radio" name="Category" id="general">
             <label for="obc">OBC</label>
             <input type="radio" name="Category" id="obc">
             <label for="scst">SC/ST</label>
             <input type="radio" name="Category" id="scst"></td>
             <td><label for="">Handicapped</label></td>
             <td>
              <label for="yes">Yes</label>
              <input type="radio" name="Handicapped" id="yes">
              <label for="no">No</label>
              <input type="radio" name="Handicapped" id="no">
             </td>
             </tr>

             <tr>
              <td><label for="Ex-Serviceman">Ex-Serviceman</label></td>
              <td>
                <label for="y">Yes</label>
              <input type="radio" name="Ex-Serviceman" id="y">
              <label for="n">No</label>
              <input type="radio" name="Ex-Serviceman" id="n">
              </td>
              <td><label for="">EWS</label></td>
              <td>
                <label for="Yes">Yes</label>
                <input type="radio" name="EWS" id="Yes">
                <label for="No">No</label>
                <input type="radio" name="EWS" id="No">
              </td>
             </tr>

             <tr>
              <td><label>Email ID</label></td>
              <td><input type="email"></td>
              <td><label>Mobile No.</label></td>
              <td><input type="number"></td>
             </tr>

             <tr>
              <td><label>State</label></td>
              <td>
                <select>
                  <option disabled selected>Select any one</option>
                  <option>Punjab</option>
                  <option>Haryana</option>
                  <option>Delhi</option>
                  <option>Himachal</option>
                </select>
              </td>
              <td><label>City</label></td>
              <td>
                <select>
                  <option disabled selected>Select any one</option>
                  <option>Jalandhar</option>
                  <option>Hoshairpur</option>
                  <option>Ludhiana</option>
                  <option>Amritsar</option>
                </select>
              </td>
             </tr>

             <tr>
              <td><label>Upload Photo</label></td>
              <td><input type="file"></td>
              <td><label>Upload Signature</label></td>
              <td><input type="file"></td>
             </tr>
             <tr>
              <td colspan="4" align="center">
                <button type="submit">Submit</button>
              </td>
             </tr>
      </fieldset>
      </table>
    </form>
</body>
</html>
